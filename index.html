<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trends - Last 24 Hours</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .trends-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }
        .trend-card {
            border-left: 8px solid #667eea;
            margin-bottom: 25px;
            padding: 25px;
            border-radius: 18px;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .trend-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        .trend-rank {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .trend-term {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .trend-metrics {
            color: #666;
            font-size: 14px;
        }
        .trend-volume {
            background: #f0f7ff;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .header-title {
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .trend-analysis {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }
        .category-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        .trend-image {
            position: relative;
        }
        .trend-rank-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 18px;
        }
        .trend-term {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .trend-content {
            padding-left: 20px;
        }
        @media (max-width: 768px) {
            .trend-content {
                padding-left: 0;
                padding-top: 15px;
            }
        }
        
        /* Google Sign-In 样式 */
        #google-signin-area {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #user-info {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="header-title display-4 fw-bold">🌍 Global Search Trends</h1>
            <p class="lead text-light">Last 24 Hours - Real-time Analysis</p>
            <div class="text-light">
                <span class="badge bg-success me-2">Updated: Just Now</span>
                <span class="badge bg-info me-2">React Powered</span>
                <span class="badge bg-warning">Live Data</span>
            </div>
            <!-- Google Sign-In Area -->
            <div id="google-signin-area" class="mt-4"></div>
            <div id="user-info" class="mt-3" style="display: none;">
                <div class="d-inline-block bg-white p-3 rounded shadow-sm d-flex align-items-center">
                    <img id="user-avatar" src="" alt="Avatar" class="user-avatar me-2" style="display: none;">
                    <div>
                        <div id="user-name" class="fw-bold"></div>
                        <small id="user-email" class="text-muted"></small>
                    </div>
                    <button id="signout-button" class="btn btn-sm btn-outline-danger ms-3">退出</button>
                </div>
            </div>
        </div>

        <div id="root"></div>
    </div>

    <!-- Google OAuth JavaScript -->
    <script>
        // ============================================
        // 重要：这里需要替换成你自己的 Google Client ID
        // 获取方式：
        // 1. 访问 https://console.cloud.google.com/
        // 2. 创建项目 → API 和服务 → 凭据
        // 3. 创建 OAuth 2.0 客户端 ID (Web 应用)
        // 4. 授权域名：https://global-trends-dashboard.pages.dev
        // ============================================
        const GOOGLE_CLIENT_ID = 'YOUR_CLIENT_ID_HERE';
        
        // 检查用户登录状态
        function checkLoginStatus() {
            const userData = localStorage.getItem('googleUser');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    showUserInfo(user);
                } catch (e) {
                    localStorage.removeItem('googleUser');
                    initGoogleSignIn();
                }
            } else {
                initGoogleSignIn();
            }
        }

        // 初始化 Google Sign-In
        function initGoogleSignIn() {
            // 等待 Google 库加载
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
                console.warn('Google Identity Services 库尚未加载，将在 500ms 后重试');
                setTimeout(initGoogleSignIn, 500);
                return;
            }

            // 先清空容器
            const container = document.getElementById('google-signin-area');
            container.innerHTML = '';
            
            // 隐藏用户信息区域
            document.getElementById('user-info').style.display = 'none';
            
            // 初始化 Google Sign-In
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse,
                auto_select: false,
                cancel_on_tap_outside: false
            });
            
            // 渲染登录按钮
            google.accounts.id.renderButton(
                container,
                {
                    type: 'standard',
                    theme: 'outline',
                    size: 'large',
                    text: 'signin_with',
                    shape: 'rectangular',
                    logo_alignment: 'left',
                    width: 250
                }
            );
            
            // 可选：显示一键登录提示（如果之前登录过）
            google.accounts.id.prompt();
        }

        // 处理登录响应
        function handleCredentialResponse(response) {
            console.log('Google 登录成功，响应:', response);
            
            // 解码 JWT token
            const userInfo = decodeJWT(response.credential);
            if (!userInfo.sub) {
                console.error('无法解析用户信息');
                return;
            }
            
            // 保存用户信息
            const userData = {
                id: userInfo.sub,
                email: userInfo.email,
                name: userInfo.name,
                picture: userInfo.picture,
                token: response.credential,
                expires_at: userInfo.exp * 1000 // 转换为毫秒
            };
            
            localStorage.setItem('googleUser', JSON.stringify(userData));
            showUserInfo(userData);
        }

        // 解码 JWT token
        function decodeJWT(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (error) {
                console.error('解码 JWT 失败:', error);
                return {};
            }
        }

        // 显示用户信息
        function showUserInfo(user) {
            const container = document.getElementById('google-signin-area');
            container.innerHTML = '';
            
            // 设置用户信息
            document.getElementById('user-name').textContent = user.name || user.email;
            document.getElementById('user-email').textContent = user.email;
            
            // 设置头像
            const avatarImg = document.getElementById('user-avatar');
            if (user.picture) {
                avatarImg.src = user.picture;
                avatarImg.style.display = 'block';
            } else {
                avatarImg.style.display = 'none';
            }
            
            // 显示用户信息区域
            document.getElementById('user-info').style.display = 'block';
        }

        // 退出登录
        function setupEventListeners() {
            const signoutBtn = document.getElementById('signout-button');
            if (signoutBtn) {
                signoutBtn.addEventListener('click', function() {
                    localStorage.removeItem('googleUser');
                    // 如果 Google 库已加载，也调用 Google 的退出
                    if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                        google.accounts.id.disableAutoSelect();
                    }
                    initGoogleSignIn();
                });
            }
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            setupEventListeners();
        });

        // 监听存储变化（用于多标签页同步）
        window.addEventListener('storage', function(e) {
            if (e.key === 'googleUser') {
                checkLoginStatus();
            }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Global trends data - Last 24 hours
        const globalTrendsData = [
            { id: 1, term: "braylon mullins", volume: "1M+", growth: "1,000%", category: "Sports", timeAgo: "16 hours ago", description: "College basketball player trending" },
            { id: 2, term: "yutz", volume: "100K+", growth: "1,000%", category: "Mystery", timeAgo: "10 hours ago", description: "Unknown term suddenly trending" },
            { id: 3, term: "warriors vs nuggets", volume: "100K+", growth: "1,000%", category: "Sports", timeAgo: "13 hours ago", description: "NBA basketball game" },
            { id: 4, term: "space exploration", volume: "20K+", growth: "1,000%", category: "Science", timeAgo: "7 hours ago", description: "NASA Artemis mission interest" },
            { id: 5, term: "artemis launch", volume: "20K+", growth: "1,000%", category: "Science", timeAgo: "7 hours ago", description: "NASA space mission" },
            { id: 6, term: "ai news", volume: "10K+", growth: "1,000%", category: "Technology", timeAgo: "7 hours ago", description: "Artificial intelligence updates" },
            { id: 7, term: "electric car", volume: "10K+", growth: "1,000%", category: "Automotive", timeAgo: "7 hours ago", description: "EV technology and news" },
            { id: 8, term: "csk vs rr", volume: "10K+", growth: "1,000%", category: "Sports", timeAgo: "1 hour ago", description: "Cricket match trending" },
            { id: 9, term: "fritz", volume: "50K+", growth: "1,000%", category: "Entertainment", timeAgo: "10 hours ago", description: "Entertainment personality" },
            { id: 10, term: "alex duong", volume: "20K+", growth: "1,000%", category: "People", timeAgo: "18 hours ago", description: "Public figure trending" },
            { id: 11, term: "bitcoin", volume: "10K+", growth: "300%", category: "Finance", timeAgo: "7 hours ago", description: "Cryptocurrency market movement" },
            { id: 12, term: "knicks vs thunder", volume: "100K+", growth: "1,000%", category: "Sports", timeAgo: "16 hours ago", description: "NBA basketball matchup" }
        ];

        // Category colors
        const categoryColors = {
            "Sports": "bg-primary",
            "Technology": "bg-success", 
            "Science": "bg-info",
            "Entertainment": "bg-warning",
            "Finance": "bg-danger",
            "Automotive": "bg-secondary",
            "People": "bg-dark",
            "Mystery": "bg-purple"
        };

        // Category image keywords for Unsplash
        const categoryImageKeywords = {
            "Sports": "basketball,sports,stadium",
            "Technology": "ai,robot,computer",
            "Science": "space,rocket,astronomy",
            "Entertainment": "movie,popcorn,concert",
            "Finance": "money,bitcoin,stock",
            "Automotive": "car,electric,tesla",
            "People": "portrait,person,face",
            "Mystery": "mystery,fog,unknown"
        };

        function TrendCard({ trend, rank }) {
            const keywordString = categoryImageKeywords[trend.category] || 'trending';
            const firstKeyword = keywordString.split(',')[0];
            const imageUrl = `https://loremflickr.com/400/300/${firstKeyword}`;
            
            return (
                <div className="trend-card">
                    <div className="row">
                        <div className="col-md-4">
                            <div className="trend-image mb-3">
                                <img 
                                    src={imageUrl} 
                                    alt={trend.term}
                                    className="img-fluid rounded"
                                    style={{ height: '200px', objectFit: 'cover', width: '100%' }}
                                />
                                <div className="trend-rank-overlay">#{rank}</div>
                            </div>
                        </div>
                        <div className="col-md-8">
                            <div className="trend-content">
                                <div className="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h4 className="trend-term mb-1">{trend.term}</h4>
                                        <div className="trend-metrics mb-2">
                                            <span className="me-3"><i className="bi bi-clock"></i> {trend.timeAgo}</span>
                                            <span className={`category-badge ${categoryColors[trend.category] || 'bg-secondary'} text-white`}>
                                                {trend.category}
                                            </span>
                                        </div>
                                    </div>
                                    <div>
                                        <span className={`badge ${trend.growth.includes('1,000%') ? 'bg-danger' : 'bg-warning'}`}>
                                            <i className="bi bi-graph-up-arrow"></i> {trend.growth}
                                        </span>
                                    </div>
                                </div>
                                
                                <div className="trend-volume mb-2">
                                    <span className="badge bg-light text-dark">
                                        <i className="bi bi-bar-chart"></i> Volume: {trend.volume}
                                    </span>
                                </div>
                                
                                {trend.description && (
                                    <p className="text-muted mb-3">{trend.description}</p>
                                )}
                                
                                <div className="d-flex justify-content-between align-items-center">
                                    <a 
                                        href={`https://news.google.com/search?q=${encodeURIComponent(trend.term)}`} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="btn btn-sm btn-outline-info"
                                    >
                                        <i className="bi bi-newspaper"></i> View related news
                                    </a>
                                    <small className="text-muted">
                                        <i className="bi bi-info-circle"></i> Global trend
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [trends, setTrends] = useState(globalTrendsData);
            const [filter, setFilter] = useState("all");
            const [searchTerm, setSearchTerm] = useState("");

            const categories = [...new Set(globalTrendsData.map(t => t.category))];

            const filteredTrends = trends.filter(trend => {
                const matchesCategory = filter === "all" || trend.category === filter;
                const matchesSearch = searchTerm === "" || 
                    trend.term.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    trend.description.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            // Calculate category distribution
            const categoryStats = {};
            trends.forEach(trend => {
                categoryStats[trend.category] = (categoryStats[trend.category] || 0) + 1;
            });

            return (
                <div className="trends-container">
                    <div className="row mb-4">
                        <div className="col-md-8">
                            <h2><i className="bi bi-trending-up"></i> Trending Search Terms</h2>
                            <p className="text-muted">Global search trends from the last 24 hours - Updated in real-time</p>
                        </div>
                        <div className="col-md-4 text-end">
                            <div className="input-group">
                                <input
                                    type="text"
                                    className="form-control"
                                    placeholder="Search trends..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <button className="btn btn-outline-primary" type="button">
                                    <i className="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Category Filter */}
                    <div className="mb-4">
                        <div className="d-flex flex-wrap gap-2">
                            <button 
                                className={`btn ${filter === "all" ? "btn-primary" : "btn-outline-primary"}`}
                                onClick={() => setFilter("all")}
                            >
                                All Categories
                            </button>
                            {categories.map(category => (
                                <button
                                    key={category}
                                    className={`btn ${filter === category ? categoryColors[category] : "btn-outline-secondary"}`}
                                    onClick={() => setFilter(category)}
                                >
                                    {category} ({categoryStats[category] || 0})
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Trends List */}
                    <div className="mb-5">
                        <div className="row">
                            {filteredTrends.map((trend, index) => (
                                <div key={trend.id} className="col-lg-4 col-md-6 mb-4">
                                    <TrendCard trend={trend} rank={index + 1} />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Analysis Section */}
                    <div className="trend-analysis">
                        <h4><i className="bi bi-lightbulb"></i> Trend Analysis & Insights</h4>
                        <div className="row mt-3">
                            <div className="col-md-6">
                                <h5>Top Categories</h5>
                                <ul className="list-group">
                                    {Object.entries(categoryStats)
                                        .sort((a, b) => b[1] - a[1])
                                        .slice(0, 3)
                                        .map(([category, count]) => (
                                            <li key={category} className="list-group-item d-flex justify-content-between align-items-center">
                                                {category}
                                                <span className="badge bg-primary rounded-pill">{count} trends</span>
                                            </li>
                                        ))}
                                </ul>
                            </div>
                            <div className="col-md-6">
                                <h5>Key Insights</h5>
                                <ul>
                                    <li><strong>Sports dominate</strong> - 5 of top 12 trends are sports-related</li>
                                    <li><strong>Space exploration trending</strong> - NASA missions driving interest</li>
                                    <li><strong>Mystery term "yutz"</strong> - Unknown origin, 100K+ searches</li>
                                    <li><strong>AI continues trending</strong> - Consistent technology interest</li>
                                    <li><strong>Cricket emerging</strong> - "csk vs rr" trending globally</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 text-center text-muted">
                        <small>
                            <i className="bi bi-info-circle"></i> Data sourced from Google Trends - Last 24 hours
                            | Built with React | Real-time updates every hour
                        </small>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS for purple category -->
    <style>
        .bg-purple { background-color: #6f42c1 !important; }
    </style>
</body>
</html>
